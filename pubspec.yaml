name: weather_assistant
description: AI天气预测+出行穿搭助手

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 网络请求
  dio: ^5.4.0
  
  # 本地存储
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # 定位
  geolocator: ^10.1.0
  
  # UI组件
  flutter_screenutil: ^5.9.0
  pull_to_refresh: ^2.0.0
  shimmer: ^3.0.0
  
  # 工具
  intl: ^0.19.0
  logger: ^2.0.2+1
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  
  # 图表
  fl_chart: ^0.66.0
  
  # 应用信息
  package_info_plus: ^5.0.1
  
  # HTML解析（网页爬取）
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  json_serializable: ^6.7.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.otf
        - asset: assets/fonts/NotoSansSC-Bold.otf
          weight: 700
        - asset: assets/fonts/NotoSansSC-Light.otf
          weight: 300
